<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore | Vibe Premium Apparel</title>
    <meta name="description" content="Explore the full Vibe collection — premium hats, tailored jeans, and handcrafted bags.">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .explore-hero {
            padding: 10rem 4rem 4rem;
            text-align: center;
        }
        .explore-hero h1 {
            font-size: 4rem;
            font-weight: 800;
            letter-spacing: 0.1rem;
            text-transform: uppercase;
            background: linear-gradient(135deg, #fff 30%, #a0a0ab 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 1rem;
        }
        .explore-hero p {
            font-family: 'Cormorant Garamond', serif;
            font-style: italic;
            font-size: 1.3rem;
            font-weight: 300;
            letter-spacing: 0.2rem;
            color: rgba(255,255,255,0.55);
        }
        .explore-filters {
            display: flex;
            justify-content: center;
            gap: 1rem;
            padding: 2rem 4rem;
            flex-wrap: wrap;
        }
        .explore-grid-wrap {
            padding: 2rem 4rem 6rem;
        }
        .explore-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 2rem;
        }
        .load-more-wrap {
            text-align: center;
            padding: 2rem 0 5rem;
        }
        .load-more-btn {
            background: transparent;
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            padding: 1rem 3rem;
            font-size: 0.85rem;
            letter-spacing: 0.2rem;
            text-transform: uppercase;
            cursor: pointer;
            border-radius: 30px;
            transition: all 0.3s;
        }
        .load-more-btn:hover {
            background: rgba(255,255,255,0.08);
            border-color: var(--accent);
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 0.15rem;
            text-transform: uppercase;
            transition: color 0.3s;
        }
        .back-link:hover {
            color: white;
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo">VIBE</a>
        <nav class="header-nav">
            <a href="index.html" class="nav-link">Home</a>
            <a href="explore.html" class="nav-link" style="color:white">Explore</a>
            <a href="favorites.html" class="nav-link">Favorites</a>
        </nav>
        <div class="header-actions">
            <button id="cart-toggle-explore" class="nav-btn" title="Market Cart">
                <i data-lucide="shopping-bag"></i>
                <span id="cart-count-explore">0</span>
            </button>
        </div>
    </header>

    <main>
        <div class="explore-hero">
            <h1>Explore Collection</h1>
            <p>Every piece curated for the bold and the refined.</p>
        </div>

        <div class="explore-filters" style="display:flex; flex-wrap:wrap; justify-content:center; gap: 1rem; margin-bottom: 2rem;">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="hats">Hats</button>
            <button class="filter-btn" data-filter="jeans">Denim</button>
            <button class="filter-btn" data-filter="shoes">Shoes</button>
            <button class="filter-btn" data-filter="apparel">Apparel</button>
            <button class="filter-btn" data-filter="accessories">Accessories</button>
            <button class="filter-btn" data-filter="bags">Bags</button>
        </div>

        <div class="explore-grid-wrap">
            <div id="explore-grid" class="explore-grid product-grid">
                <!-- Dynamically inserted -->
            </div>
        </div>
    </main>

    <!-- Cart Slide Panel -->
    <aside id="cart-panel-explore" class="favorites-panel cart-panel">
        <div class="panel-header">
            <h2>Your Market</h2>
            <button id="close-cart-explore" class="close-btn"><i data-lucide="x"></i></button>
        </div>
        <div id="cart-list-explore" class="favorites-list">
            <div class="empty-state">Your market is empty.</div>
        </div>
        <div class="cart-footer" id="cart-footer-explore" style="display:none">
            <div class="cart-total"><span>Total</span><span id="cart-total-price-explore">$0.00</span></div>
            <a href="checkout.html" class="checkout-btn">Proceed to Checkout <i data-lucide="arrow-right"></i></a>
        </div>
    </aside>
    <div id="panel-overlay-explore" class="panel-overlay"></div>

    <!-- Product Zoom Modal -->
    <div id="product-modal" class="product-modal">
        <div class="modal-content">
            <button id="close-modal" class="close-btn modal-close"><i data-lucide="x"></i></button>
            <div class="modal-body">
                <div class="modal-img-container">
                    <img id="modal-img" src="" alt="Product">
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script>
        lucide.createIcons();

        // All products — in production these come from a DB
        const allProducts = [
            { id: 1,  name: "Luxury Dress Watch", category: "accessories", price: 450.00, image: "product-4.png", desc: "A high-end mechanical dress watch." },
            { id: 2,  name: "Classic Fedora",   category: "hats",  price: 85.00,  image: "product-1.png", desc: "Timeless felt fedora, handcrafted in Morocco." },
            { id: 3,  name: "Urban Denim",       category: "jeans", price: 120.00, image: "product-3.png", desc: "Slate-washed slim denim with micro-detailing." },
            { id: 4,  name: "Designer Wallet",   category: "accessories", price: 135.00, image: "product-6.png", desc: "Leather wallet and designer shades." },
            { id: 5,  name: "Leather Duffel",      category: "bags",  price: 210.00, image: "product-2.png", desc: "Full-grain Italian leather weekend duffel." },
            { id: 6,  name: "Chelsea Boots",     category: "shoes",  price: 150.00, image: "product-5.png", desc: "Premium men's leather chelsea boots." },
            { id: 7,  name: "Authentic Blue Jeans", category: "jeans", price: 90.00, image: "product-7.png", desc: "Classic blue denim." },
            { id: 8,  name: "Premium Black Tee",    category: "apparel", price: 45.00, image: "product-8.png", desc: "Essential dark cotton t-shirt." },
            { id: 9,  name: "White Sneakers",       category: "shoes", price: 110.00, image: "product-9.png", desc: "Minimalist white high-top sneakers." },
            { id: 10, name: "Leather Work Boots",   category: "shoes", price: 195.00, image: "product-10.png", desc: "Rugged brown leather boots." },
            { id: 11, name: "Pro Baseball Cap",     category: "hats", price: 35.00, image: "product-11.png", desc: "Classic athletic headwear." },
            { id: 12, name: "Essential White Tee",  category: "apparel", price: 40.00, image: "product-12.png", desc: "Clean and classic white shirt." },
        ];

        let cart = JSON.parse(localStorage.getItem('vibe-cart')) || [];
        let favorites = JSON.parse(localStorage.getItem('vibe-favorites')) || [];
        favorites = favorites.map(f => typeof f === 'object' ? f.id : f).filter(f => typeof f === 'number');
        localStorage.setItem('vibe-favorites', JSON.stringify(favorites));
        const overlay = document.getElementById('panel-overlay-explore');
        const cartPanelEl = document.getElementById('cart-panel-explore');
        const cartListEl = document.getElementById('cart-list-explore');
        const cartFooterEl = document.getElementById('cart-footer-explore');
        const cartCountEl = document.getElementById('cart-count-explore');
        const cartTotalEl = document.getElementById('cart-total-price-explore');
        const grid = document.getElementById('explore-grid');

        function renderExploreGrid(filter = 'all') {
            grid.innerHTML = '';
            
            let filtered = allProducts;
            if(filter !== 'all') {
                filtered = allProducts.filter(p => p.category === filter);
            }
            filtered.forEach(product => {
                const isFav = favorites.includes(product.id);
                const card = document.createElement('div');
                card.className = 'product-card';
                card.innerHTML = `
                    <div class="card-img-wrapper">
                            <img src="${product.image}" alt="${product.name}" class="card-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/400x500/2a2a30/ffffff?text=${encodeURIComponent(product.name)}'">
                            <button class="fav-icon-btn" onclick="toggleFav(event, ${product.id})" data-id="${product.id}" title="Toggle Favorite">
                                <i data-lucide="heart" fill="${isFav ? '#ff2a5f' : 'none'}" color="${isFav ? '#ff2a5f' : 'white'}"></i>
                            </button>
                    </div>
                    <div class="card-info">
                        <div class="card-category">${product.category}</div>
                        <h3 class="card-title">${product.name}</h3>
                        <p style="font-size:0.8rem;color:rgba(255,255,255,0.45);margin-bottom:0.5rem;">${product.desc}</p>
                        <div class="card-price-row">
                            <div class="card-price">$${product.price.toFixed(2)}</div>
                            <button class="add-to-cart-btn" data-id="${product.id}" title="Add to Market">
                                <i data-lucide="shopping-bag"></i>
                            </button>
                        </div>
                        </div>
                    `;
                    const imgWrapper = card.querySelector('.card-img-wrapper');
                    imgWrapper.style.cursor = 'zoom-in';
                    imgWrapper.addEventListener('click', (e) => {
                        e.stopPropagation();
                        openProductModal({image: product.image, name: product.name});
                    });
                    grid.appendChild(card);
            });
            lucide.createIcons();
            attachCartBtns();
            animateCards();
        }

        function attachCartBtns() {
            document.querySelectorAll('.add-to-cart-btn').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    addToCart(parseInt(btn.getAttribute('data-id')));
                });
            });
        }

        window.currentFilter = 'all';

        function toggleFav(e, id) {
            e.stopPropagation();
            if (favorites.includes(id)) {
                favorites = favorites.filter(f => f !== id);
            } else {
                favorites.push(id);
            }
            localStorage.setItem('vibe-favorites', JSON.stringify(favorites));
            
            // In-place UI update to completely bypass flickering grid redraws
            const isNowFav = favorites.includes(id);
            document.querySelectorAll(`.fav-icon-btn[data-id="${id}"]`).forEach(btn => {
                const icon = btn.querySelector('svg') || btn.querySelector('i');
                if (icon) {
                    icon.setAttribute('fill', isNowFav ? '#ff2a5f' : 'none');
                    icon.setAttribute('color', isNowFav ? '#ff2a5f' : 'white');
                    icon.setAttribute('stroke', isNowFav ? '#ff2a5f' : 'white');
                }
            });
        }

        function addToCart(id) {
            const existing = cart.find(i => i.id === id);
            if (existing) existing.qty++;
            else cart.push({ id, qty: 1 });
            localStorage.setItem('vibe-cart', JSON.stringify(cart));
            updateCartUI();
            cartPanelEl.classList.add('open');
            overlay.classList.add('active');
        }

        function updateCartUI() {
            const total = cart.reduce((s, i) => s + i.qty, 0);
            cartCountEl.textContent = total;
            if (cart.length === 0) {
                cartListEl.innerHTML = '<div class="empty-state">Your market is empty.</div>';
                cartFooterEl.style.display = 'none';
                return;
            }
            cartFooterEl.style.display = 'block';
            cartListEl.innerHTML = '';
            let grand = 0;
            cart.forEach(item => {
                const p = allProducts.find(x => x.id === item.id);
                if (!p) return;
                grand += p.price * item.qty;
                const el = document.createElement('div');
                el.className = 'fav-item';
                el.innerHTML = `
                    <img src="${p.image}" alt="${p.name}" class="fav-item-img" onerror="this.onerror=null; this.src='https://via.placeholder.com/60x75'">
                    <div class="fav-item-info">
                        <div class="fav-item-title">${p.name}</div>
                        <div class="cart-qty-row">
                            <button class="qty-btn" data-id="${p.id}" data-action="dec">−</button>
                            <span class="qty-label">${item.qty}</span>
                            <button class="qty-btn" data-id="${p.id}" data-action="inc">+</button>
                        </div>
                        <div class="fav-item-price">$${(p.price*item.qty).toFixed(2)}</div>
                    </div>
                    <button class="remove-fav-btn remove-cart-item" data-id="${p.id}"><i data-lucide="trash-2"></i></button>
                `;
                cartListEl.appendChild(el);
            });
            cartTotalEl.textContent = '$' + grand.toFixed(2);
            lucide.createIcons();
            document.querySelectorAll('.remove-cart-item').forEach(btn => {
                btn.addEventListener('click', () => {
                    cart = cart.filter(i => i.id !== parseInt(btn.getAttribute('data-id')));
                    localStorage.setItem('vibe-cart', JSON.stringify(cart));
                    updateCartUI();
                });
            });
            document.querySelectorAll('.qty-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    const id = parseInt(btn.getAttribute('data-id'));
                    const action = btn.getAttribute('data-action');
                    const item = cart.find(i => i.id === id);
                    if (!item) return;
                    if (action === 'inc') item.qty++;
                    else { item.qty--; if (item.qty <= 0) cart = cart.filter(i => i.id !== id); }
                    localStorage.setItem('vibe-cart', JSON.stringify(cart));
                    updateCartUI();
                });
            });
        }

        document.getElementById('cart-toggle-explore').addEventListener('click', () => {
            cartPanelEl.classList.add('open');
            overlay.classList.add('active');
        });
        document.getElementById('close-cart-explore').addEventListener('click', () => {
            cartPanelEl.classList.remove('open');
            overlay.classList.remove('active');
        });
        overlay.addEventListener('click', () => {
            cartPanelEl.classList.remove('open');
            overlay.classList.remove('active');
        });

        document.querySelectorAll('.filter-btn').forEach(btn => {
            btn.addEventListener('click', e => {
                document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                e.target.classList.add('active');
                window.currentFilter = e.target.getAttribute('data-filter');
                renderExploreGrid(window.currentFilter);
            });
        });

        gsap.registerPlugin(ScrollTrigger);
        function animateCards() {
            const cards = gsap.utils.toArray('.product-card');
            if (!cards.length) return;
            gsap.from(cards, { y: 70, opacity: 0, duration: 0.8, stagger: 0.15, ease: 'power2.out', clearProps: 'all' });
        }

        const productModal = document.getElementById('product-modal');
        const modalImg = document.getElementById('modal-img');
        const closeModalBtn = document.getElementById('close-modal');

        function openProductModal(product) {
            modalImg.src = product.image;
            modalImg.alt = product.name;
            productModal.classList.add('active');
        }

        function closeProductModal() {
            productModal.classList.remove('active');
        }

        closeModalBtn.addEventListener('click', closeProductModal);
        productModal.addEventListener('click', (e) => {
            if (e.target === productModal) {
                closeProductModal();
            }
        });

        renderExploreGrid();
        updateCartUI();
    </script>
</body>
</html>
